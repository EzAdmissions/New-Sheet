name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: release/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: New Sheet v${{ steps.pkg.outputs.version }}
          make_latest: true
          files: artifacts/*
          body: |
            ## New Sheet v${{ steps.pkg.outputs.version }}

            | Platform | File |
            |----------|------|
            | **Windows** | `New Sheet Setup ${{ steps.pkg.outputs.version }}.exe` |
            | **Mac (Intel + Apple Silicon)** | `New Sheet ${{ steps.pkg.outputs.version }}.dmg` |

            > **Mac first launch:** Right-click the app, click Open, then click Open again to bypass the Gatekeeper warning (required once for unsigned apps).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
